<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFM Content Studio</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <header class="header">

        <div>
            <h1>LFM Content Studio</h1>
            <div class="version">Version 0.1</div>
        </div>

        <div class="db-panel">

            <div class="db-row">
                <span class="label">Database :</span>
                <span id="lblDatabase">No database selected</span>
            </div>

            <div class="db-row">
                <span class="label">Status :</span>
                <span id="lblStatus" class="status disconnected">Disconnected</span>
            </div>

            <div class="toolbar">
                <button id="btnOpenDatabase">Open Database</button>
                <button id="btnSaveDatabase" disabled>Save Database</button>
            </div>

        </div>

    </header>

    <main>

        <section class="card">

            <h2>Lesson Generator</h2>

            <div class="grid2">

                <div>
                    <label for="txtMapLessonId">Map Lesson ID</label>
                    <input type="text" id="txtMapLessonId">
                </div>

                <div>
                    <label for="txtMapLessonName">Map Lesson Name</label>
                    <input type="text" id="txtMapLessonName">
                </div>

            </div>

            <div class="field">

                <label for="txtDescription">Description</label>

                <textarea
                        id="txtDescription"
                        rows="3"></textarea>

            </div>

            <div class="grid4">

                <div>
                    <label for="txtTooltipListId">Tooltip List ID</label>
                    <input type="text" id="txtTooltipListId">
                </div>

                <div>
                    <label for="txtPolylineListId">Polyline List ID</label>
                    <input type="text" id="txtPolylineListId">
                </div>

                <div>
                    <label for="txtPolygonListId">Polygon List ID</label>
                    <input type="text" id="txtPolygonListId">
                </div>

                <div>
                    <label for="txtTextMarkerListId">Text Marker List ID</label>
                    <input type="text" id="txtTextMarkerListId">
                </div>

            </div>

            <div class="grid4">

                <div>
                    <label for="txtDefaultZoom">Default Zoom</label>
                    <input type="number" id="txtDefaultZoom">
                </div>

                <div>
                    <label for="txtCentreLatLng">Centre LatLng</label>
                    <input type="text" id="txtCentreLatLng">
                </div>

                <div>
                    <label for="txtMinZoom">Min Zoom</label>
                    <input type="number" id="txtMinZoom">
                </div>

                <div>
                    <label for="txtMaxZoom">Max Zoom</label>
                    <input type="number" id="txtMaxZoom">
                </div>

            </div>

            <div class="grid2">

                <div>
                    <label for="txtTopicName">Topic Name</label>
                    <input type="text" id="txtTopicName">
                </div>

                <div>
                    <label for="txtMainTopic">Main Topic</label>
                    <input type="text" id="txtMainTopic">
                </div>

            </div>

            <div class="field">

                <label for="txtTextMarkerIds">
                    Existing Text Marker IDs (one per line)
                </label>

                <textarea
                        id="txtTextMarkerIds"
                        rows="8"
                        placeholder="100001&#10;100002&#10;100003"></textarea>

            </div>

            <div class="buttons">

                <button id="btnSaveLesson" disabled>
                    Save Lesson
                </button>

                <button id="btnClear">
                    Clear
                </button>

            </div>

        </section>

        <section class="card">

            <h2>SQL Log</h2>

            <textarea
                    id="txtSqlLog"
                    rows="12"
                    readonly></textarea>

        </section>

        <section class="card">

            <h2>Messages</h2>

            <textarea
                    id="txtMessageLog"
                    rows="6"
                    readonly></textarea>

        </section>

    </main>

</div>

<input
        type="file"
        id="fileDatabase"
        accept=".db,.sqlite,.sqlite3"
        hidden>

<script src="lib/sql-wasm.js"></script>

<script src="js/sqlite.js"></script>

<script src="js/app.js"></script>

</body>
</html>
